name: Keyward
main: com.keyward.Keyward
version: 1.0.0
api-version: 1.20
author: Kodari
description: Nobody gets in unverified.

commands:
  register:
    description: Register a new cracked account
    usage: /register <password> <confirm>
  login:
    description: Log in to your account
    usage: /login <password>
  changepassword:
    description: Change your account password
    usage: /changepassword <old> <new> <confirm>
  2fa:
    description: Manage two-factor authentication
    usage: /2fa <enable|disable|verify> [code]
  keyward:
    description: Keyward admin commands
    usage: /keyward <panic|verify|flagip|unflagip|reload>
    permission: keyward.admin

permissions:
  keyward.admin:
    description: Access to Keyward admin commands
    default: op